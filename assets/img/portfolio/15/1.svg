<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2137;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="700" cy="80" r="120" fill="#0ea5e9" opacity="0.05"/>
  <circle cx="100" cy="420" r="80" fill="#06b6d4" opacity="0.05"/>
  <!-- Cloud/mist icon -->
  <ellipse cx="380" cy="190" rx="60" ry="30" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
  <ellipse cx="420" cy="185" rx="40" ry="25" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
  <ellipse cx="350" cy="195" rx="35" ry="22" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
  <line x1="360" y1="218" x2="355" y2="245" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <line x1="390" y1="220" x2="390" y2="250" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <line x1="420" y1="218" x2="425" y2="245" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <!-- Title -->
  <text x="400" y="300" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Mistyug</text>
  <text x="400" y="338" font-family="Arial, sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle">Modern Web Platform</text>
  <!-- Bottom accent bar -->
  <rect x="0" y="480" width="800" height="20" fill="url(#accent)" opacity="0.6"/>
  <!-- URL -->
  <text x="400" y="465" font-family="Arial, sans-serif" font-size="13" fill="#0891b2" text-anchor="middle">mistyug.com</text>
</svg>
