<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#ffffff08" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="#ffffff08" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="#ffffff08" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="#ffffff08" stroke-width="1"/>
  <!-- Shield icon -->
  <path d="M400 140 L440 158 L440 200 Q440 230 400 248 Q360 230 360 200 L360 158 Z" fill="none" stroke="url(#accent)" stroke-width="3"/>
  <path d="M385 194 L395 204 L418 180" stroke="#7c3aed" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Title -->
  <text x="400" y="295" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">Gatekeeper Zero</text>
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle">Access Control &amp; Security Platform</text>
  <!-- Bottom accent bar -->
  <rect x="0" y="480" width="800" height="20" fill="url(#accent)" opacity="0.6"/>
  <!-- URL -->
  <text x="400" y="465" font-family="Arial, sans-serif" font-size="13" fill="#6d28d9" text-anchor="middle">gatekeeperzero.com</text>
</svg>
